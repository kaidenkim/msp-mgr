services:
  msp-manager:
    image: msp-manager:latest
    build: .
    container_name: msp-manager
    restart: unless-stopped
    ports:
      - "9070:9070"
    env_file:
      - .env
    environment:
      MSP_CACHE_DIR: /app/cache
      CLOUDSDK_CONFIG: /root/.config/gcloud
    volumes:
      # 관리자 비밀번호 등 런타임 데이터
      - msp-db-data:/app/data
      # GCP 스캔 캐시 + 일별 히스토리 (재시작 후에도 유지)
      - msp-cache:/app/cache
      # EC2 호스트의 gcloud 인증 정보 공유
      - /root/.config/gcloud:/root/.config/gcloud
      - /usr/lib64/google-cloud-sdk:/usr/lib64/google-cloud-sdk:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  msp-cache:
  msp-db-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/ec2-user/msp-manager/data
